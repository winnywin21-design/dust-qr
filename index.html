<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 주변 미세먼지</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100vh; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      color: #1f2937;
      background: linear-gradient(180deg, #f5f7fa 0%, #e5e7eb 100%);
      transition: background 0.8s ease;
      min-height: 100vh;
    }

    /* 등급별 배경 그라데이션 */
    body.bg-1 {
      background: linear-gradient(180deg, #e0f2fe 0%, #bae6fd 100%);
    }
    body.bg-2 {
      background: linear-gradient(180deg, #fefce8 0%, #fef3c7 100%);
    }
    body.bg-3 {
      background: linear-gradient(180deg, #ffedd5 0%, #fed7aa 100%);
    }
    body.bg-4 {
      background: linear-gradient(180deg, #fee2e2 0%, #fecaca 100%);
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 { font-size: 24px; margin-bottom: 4px; }
    .subtitle { color: #6b7280; margin-bottom: 24px; font-size: 14px; }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      margin-bottom: 16px;
    }
    .status { font-size: 15px; color: #374151; line-height: 1.6; }

    button {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover:not(:disabled) { background: #2563eb; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    .hidden { display: none; }

    .result-station { font-size: 13px; color: #6b7280; margin-bottom: 16px; }
    .result-station strong { color: #1f2937; font-size: 15px; }

    .metric {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 14px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .metric:last-of-type { border-bottom: none; }
    .metric-label { font-size: 14px; color: #6b7280; }
    .metric-value { font-size: 22px; font-weight: 700; }
    .metric-unit { font-size: 12px; color: #9ca3af; margin-left: 4px; }

    .grade {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 8px;
    }
    .grade-1 { background: #dbeafe; color: #1d4ed8; }
    .grade-2 { background: #d1fae5; color: #047857; }
    .grade-3 { background: #fed7aa; color: #c2410c; }
    .grade-4 { background: #fecaca; color: #b91c1c; }

    .time { font-size: 12px; color: #9ca3af; margin-top: 12px; text-align: right; }

    /* 등급별 조언 메시지 */
    .advice {
      padding: 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      margin: 16px 0;
      text-align: center;
    }
    .advice-1 { background: #dbeafe; color: #1e40af; }
    .advice-2 { background: #d1fae5; color: #065f46; }
    .advice-3 { background: #fed7aa; color: #9a3412; }
    .advice-4 { background: #fecaca; color: #991b1b; }
    .advice-title { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌫️ 내 주변 미세먼지</h1>
    <p class="subtitle">실시간 위치 기반 대기질 정보</p>

    <div class="card">
      <p class="status" id="status">버튼을 눌러 내 주변 공기질을 확인해보세요.</p>
    </div>

    <div class="card hidden" id="result">
      <div class="result-station" id="resultStation"></div>
      <div class="advice" id="advice"></div>
      <div class="metric">
        <span class="metric-label">초미세먼지 PM2.5</span>
        <span>
          <span class="metric-value" id="pm25">-</span>
          <span class="metric-unit">㎍/㎥</span>
          <span class="grade" id="pm25Grade"></span>
        </span>
      </div>
      <div class="metric">
        <span class="metric-label">미세먼지 PM10</span>
        <span>
          <span class="metric-value" id="pm10">-</span>
          <span class="metric-unit">㎍/㎥</span>
          <span class="grade" id="pm10Grade"></span>
        </span>
      </div>
      <p class="time" id="dataTime"></p>
    </div>

    <button id="checkBtn" onclick="checkDust()">내 주변 미세먼지 확인</button>
  </div>

  <script>
    const GRADE_LABELS = { '1': '좋음', '2': '보통', '3': '나쁨', '4': '매우나쁨' };

    // PM10 기준 등급별 메시지
    const PM10_ADVICE = {
      '1': { title: '🌿 공기가 쾌적해요!', message: '야외 활동하기 좋은 날이에요.' },
      '2': { title: '😊 보통 수준이에요', message: '민감하신 분은 장시간 야외활동 시 주의하세요.' },
      '3': { title: '⚠️ 공기질이 좋지 않아요', message: '외출 시 KF80 이상 마스크 착용을 권장해요.' },
      '4': { title: '🚨 공기질이 매우 나빠요!', message: '가급적 외출을 자제하고, 나가실 땐 KF94 마스크를 착용해 주세요.' }
    };

    function getPm10Grade(value) {
      const v = parseInt(value, 10);
      if (isNaN(v)) return null;
      if (v <= 30) return '1';
      if (v <= 80) return '2';
      if (v <= 150) return '3';
      return '4';
    }

    function setGrade(el, grade) {
      el.className = 'grade';
      if (!grade || !GRADE_LABELS[grade]) {
        el.textContent = '';
        return;
      }
      el.classList.add('grade-' + grade);
      el.textContent = GRADE_LABELS[grade];
    }

    // 배경 그라데이션 변경
    function setBodyGrade(grade) {
      document.body.classList.remove('bg-1', 'bg-2', 'bg-3', 'bg-4');
      if (grade && GRADE_LABELS[grade]) {
        document.body.classList.add('bg-' + grade);
      }
    }

    async function checkDust() {
      const status = document.getElementById('status');
      const btn = document.getElementById('checkBtn');
      const result = document.getElementById('result');

      if (!navigator.geolocation) {
        status.textContent = '이 브라우저는 위치 정보를 지원하지 않습니다.';
        return;
      }

      btn.disabled = true;
      result.classList.add('hidden');
      status.textContent = '📍 위치 확인 중...';

      try {
        const position = await new Promise((resolve, reject) => {
          navigator.geolocation.getCurrentPosition(resolve, reject, {
            enableHighAccuracy: true,
            timeout: 10000
          });
        });

        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        status.textContent = '🌫️ 미세먼지 정보 가져오는 중...';

        const res = await fetch('/api/dust?lat=' + lat + '&lon=' + lon);
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || '데이터를 받지 못했습니다');
        }
        const data = await res.json();

        document.getElementById('resultStation').innerHTML =
          '측정소: <strong>' + data.stationName + '</strong> (약 ' + data.distance + 'km)<br>' +
          (data.stationAddr || '');

        document.getElementById('pm25').textContent = data.pm25 ?? '-';
        setGrade(document.getElementById('pm25Grade'), data.pm25Grade);

        document.getElementById('pm10').textContent = data.pm10 ?? '-';
        setGrade(document.getElementById('pm10Grade'), data.pm10Grade);

        // PM10 기준 등급별 조언 + 배경색 변화
        const pm10Grade = data.pm10Grade || getPm10Grade(data.pm10);
        const adviceEl = document.getElementById('advice');
        if (pm10Grade && PM10_ADVICE[pm10Grade]) {
          adviceEl.className = 'advice advice-' + pm10Grade;
          adviceEl.innerHTML =
            '<div class="advice-title">' + PM10_ADVICE[pm10Grade].title + '</div>' +
            '<div>' + PM10_ADVICE[pm10Grade].message + '</div>';
        } else {
          adviceEl.className = 'advice';
          adviceEl.textContent = '';
        }

        // 🎨 배경 그라데이션 변경!
        setBodyGrade(pm10Grade);

        document.getElementById('dataTime').textContent =
          data.dataTime ? '측정 시각: ' + data.dataTime : '';

        status.textContent = '✅ 최신 정보로 업데이트 완료';
        result.classList.remove('hidden');
      } catch (err) {
        status.textContent = '⚠️ 오류: ' + err.message;
      } finally {
        btn.disabled = false;
      }
    }

    window.addEventListener('load', checkDust);
  </script>
</body>
</html>
